spring.application.name=reservations
spring.profiles.active=local
# Base de données MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/reservations?autoreconnect=true&useSSL=false&serverTimezone=Europe/Brussels&useLegacyDatetimeCode=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Thymeleaf
spring.thymeleaf.cache=false

# Formulaires PUT/DELETE
spring.mvc.hiddenmethod.filter.enabled=true

spring.jpa.open-in-view=false

# === Configuration MailTrap (envoi d'emails de test) ===
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Adresse "expéditeur" affichée dans les emails envoyés
app.mail.from=noreply@reservations.local