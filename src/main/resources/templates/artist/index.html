<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Liste des artistes</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Liste des artistes</h2>
        <a th:href="@{/artists/create}" class="btn btn-success">
            + Nouvel artiste
        </a>
    </div>

    <table class="table table-striped table-hover" 
           th:unless="${#lists.isEmpty(artists)}">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Prénom</th>
                <th>Nom</th>
                <th class="text-center">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="artist : ${artists}">
                <td th:text="${artist.id}"></td>
                <td th:text="${artist.firstname}"></td>
                <td>
                    <a th:href="@{/artists/{id}(id=${artist.id})}"
                       th:text="${artist.lastname}"></a>
                </td>
                <td class="text-center">
                    <a th:href="@{/artists/{id}(id=${artist.id})}"
                       class="btn btn-sm btn-info">Voir</a>
                    <a th:href="@{/artists/{id}/edit(id=${artist.id})}"
                       class="btn btn-sm btn-warning">Modifier</a>
                    <form th:id="|deleteForm-${artist.id}|"
                          th:action="@{/artists/{id}(id=${artist.id})}"
                          th:method="delete" class="d-inline">
                        <button type="button" class="btn btn-sm btn-danger"
                                th:onclick="|if(confirm('Supprimer cet artiste ?')) 
                                document.getElementById('deleteForm-${artist.id}')
                                .submit()|">
                            Supprimer
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(artists)}" class="alert alert-info">
        Aucun artiste trouvé.
    </div>
</div>
</body>
</html>
