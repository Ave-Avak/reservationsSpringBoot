<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${artist.firstname + ' ' + artist.lastname}">Artiste</title>
</head>
<body>
<div layout:fragment="content">
    <h2 th:text="|${artist.firstname} ${artist.lastname}|">Nom Artiste</h2>

    <table class="table table-bordered w-50">
        <tr>
            <th>ID</th>
            <td th:text="${artist.id}"></td>
        </tr>
        <tr>
            <th>Prénom</th>
            <td th:text="${artist.firstname}"></td>
        </tr>
        <tr>
            <th>Nom</th>
            <td th:text="${artist.lastname}"></td>
        </tr>
    </table>

    <div class="mt-3">
        <a th:href="@{/artists/{id}/edit(id=${artist.id})}"
           class="btn btn-warning">Modifier</a>
        <form th:id="|deleteForm-${artist.id}|"
              th:action="@{/artists/{id}(id=${artist.id})}"
              th:method="delete" class="d-inline">
            <button type="button" class="btn btn-danger"
                    th:onclick="|if(confirm('Supprimer cet artiste ?'))
                    document.getElementById('deleteForm-${artist.id}')
                    .submit()|">
                Supprimer
            </button>
        </form>
        <a th:href="@{/artists}" class="btn btn-secondary">
            Retour à la liste
        </a>
    </div>
</div>
</body>
</html>
