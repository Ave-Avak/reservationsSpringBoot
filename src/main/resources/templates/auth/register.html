<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title>Inscription</title>
</head>

<body>

<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h1 class="mb-4 text-center">Créer un compte</h1>

            <form th:action="@{/register}" th:object="${user}" method="post">

                <!-- Login -->
                <div class="mb-3">
                    <label for="login" class="form-label">Nom d'utilisateur *</label>
                    <input type="text" id="login" th:field="*{login}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('login')} ? 'is-invalid'"
                           autofocus>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('login')}"
                         th:errors="*{login}"></div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" id="email" th:field="*{email}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}"></div>
                </div>

                <!-- Prénom -->
                <div class="mb-3">
                    <label for="firstname" class="form-label">Prénom</label>
                    <input type="text" id="firstname" th:field="*{firstname}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('firstname')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('firstname')}"
                         th:errors="*{firstname}"></div>
                </div>

                <!-- Nom -->
                <div class="mb-3">
                    <label for="lastname" class="form-label">Nom</label>
                    <input type="text" id="lastname" th:field="*{lastname}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('lastname')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('lastname')}"
                         th:errors="*{lastname}"></div>
                </div>

                <!-- Mot de passe -->
                <div class="mb-3">
                    <label for="password" class="form-label">Mot de passe *</label>
                    <input type="password" id="password" th:field="*{password}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}"></div>
                    <small class="form-text text-muted">8 caractères minimum.</small>
                </div>

                <!-- Confirmation du mot de passe -->
                <div class="mb-3">
                    <label for="passwordConfirm" class="form-label">Confirmer le mot de passe *</label>
                    <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('passwordConfirm')}"
                         th:errors="*{passwordConfirm}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
            </form>

            <div class="mt-3 text-center">
                <span>Déjà inscrit ?</span>
                <a th:href="@{/login}">Se connecter</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
