<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title>Mot de passe oublié</title>
</head>

<body>

<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h1 class="mb-4 text-center">Mot de passe oublié</h1>

            <p class="text-muted">
                Entrez votre adresse email. Si elle correspond à un compte,
                un lien de réinitialisation vous sera envoyé.
            </p>

            <form th:action="@{/forgot-password}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email"
                           class="form-control"
                           required autofocus>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Envoyer le lien de réinitialisation
                </button>
            </form>

            <div class="mt-3 text-center">
                <a th:href="@{/login}">Retour à la connexion</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
