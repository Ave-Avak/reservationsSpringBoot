<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title>Nouveau mot de passe</title>
</head>

<body>

<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h1 class="mb-4 text-center">Nouveau mot de passe</h1>

            <!-- Affichage d'une erreur éventuelle (token invalide, mismatch...) -->
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <p class="text-muted">
                Choisissez un nouveau mot de passe pour votre compte.
            </p>

            <form th:action="@{/reset-password}" method="post">

                <!-- Token caché : ré-envoyé lors du POST -->
                <input type="hidden" name="token" th:value="${token}">

                <div class="mb-3">
                    <label for="password" class="form-label">Nouveau mot de passe</label>
                    <input type="password" id="password" name="password"
                           class="form-control"
                           required autofocus minlength="8">
                    <small class="form-text text-muted">8 caractères minimum.</small>
                </div>

                <div class="mb-3">
                    <label for="passwordConfirm" class="form-label">Confirmer le mot de passe</label>
                    <input type="password" id="passwordConfirm" name="passwordConfirm"
                           class="form-control"
                           required minlength="8">
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Réinitialiser le mot de passe
                </button>
            </form>

            <div class="mt-3 text-center">
                <a th:href="@{/login}">Retour à la connexion</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
