<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title>Réserver - <span th:text="${representation.show.title}">Spectacle</span></title>
</head>

<body>
<div layout:fragment="content">

    <div class="container mt-4">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a th:href="@{/shows}">Catalogue</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{'/shows/' + ${representation.show.slug}}"
                       th:text="${representation.show.title}">Spectacle</a>
                </li>
                <li class="breadcrumb-item active">Réserver</li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <h1 class="mb-4">🎫 Nouvelle réservation</h1>

                <!-- Récapitulatif de la représentation -->
                <div class="card mb-4 bg-light">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${representation.show.title}">Titre</h5>
                        <p class="mb-1">
                            📍 <strong th:text="${representation.location.designation}">Lieu</strong>
                            <span class="text-muted small ms-2"
                                  th:text="${representation.location.locality.fullName}">Ville</span>
                        </p>
                        <p class="mb-0">
                            🗓 <strong th:text="${representation.formattedSchedule}">Date</strong>
                        </p>
                    </div>
                </div>

                <!-- Formulaire -->
                <form th:action="@{/reservations}" th:object="${reservationDto}" method="post">

                    <!-- Champ caché : ID de la représentation -->
                    <input type="hidden" th:field="*{representationId}">

                    <div class="mb-3">
                        <label for="places" class="form-label">
                            <strong>Nombre de places *</strong>
                        </label>
                        <input type="number"
                               id="places"
                               th:field="*{places}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('places')} ? 'is-invalid'"
                               min="1"
                               max="10"
                               required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('places')}"
                             th:errors="*{places}"></div>
                        <small class="form-text text-muted">
                            Entre 1 et 10 places par réservation.
                        </small>
                    </div>

                    <!-- Info statut -->
                    <div class="alert alert-info">
                        💡 Votre réservation sera créée avec le statut <strong>"En attente"</strong>.
                        Vous pourrez la confirmer ou l'annuler depuis votre profil.
                    </div>

                    <!-- Actions -->
                    <div class="d-flex justify-content-between">
                        <a th:href="@{'/shows/' + ${representation.show.slug}}"
                           class="btn btn-outline-secondary">
                            ← Annuler
                        </a>
                        <button type="submit" class="btn btn-primary">
                            Confirmer la réservation →
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>

</div>
</body>
</html>
